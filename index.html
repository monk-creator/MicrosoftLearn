<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Guide – Training | Microsoft Learn (personal demo)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>Turn on JavaScript to use this app.</noscript>
    <!-- Outside #root so Vite’s build output always keeps this until JS runs -->
    <div
      id="boot-banner"
      class="boot-shell"
      style="font-family: system-ui, sans-serif; padding: 2rem 1.5rem; max-width: 40rem; margin: 0 auto; color: #323130"
    >
      <p class="boot-shell-title">Loading…</p>
      <p class="boot-shell-note">
        If this never goes away, scripts did not load. Deploy the <strong>dist</strong> output of
        <code>npm run build</code>, not the Git repo source. Check DevTools → Console / Network.
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
